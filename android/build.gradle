plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.plaidlinksdk'
version = '0.1.0'

android {
  namespace "expo.modules.plaidlinksdk"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}


kotlin {
  compilerOptions {
    freeCompilerArgs.add("-Xskip-metadata-version-check")
  }
}

dependencies {
  implementation "com.plaid.link:sdk-core:6.0.0"
  testImplementation "junit:junit:4.13.2"
}

gradle.projectsEvaluated {
  rootProject.allprojects { project ->
    project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach { task ->
      task.compilerOptions.freeCompilerArgs.add("-Xskip-metadata-version-check")
    }
    if (project.name.startsWith("expo")) {
      project.tasks.withType(org.gradle.api.tasks.testing.Test).configureEach { task ->
        task.failOnNoDiscoveredTests = false
      }
    }
  }
}
